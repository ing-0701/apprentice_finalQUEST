{% load static %}
<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ステージ３画面</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="{% static 'game/css/stage3.css' %}">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Balthazar&family=Baskervville:ital,wght@0,400..700;1,400..700&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Jacquard+12&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Sawarabi+Mincho&family=UnifrakturMaguntia&family=Zen+Antique+Soft&display=swap" rel="stylesheet">    </head>
    <body>
        {% csrf_token %}
        <div class="stage3-wrapper">
            <h1>ステージ3：王の試練</h1>

            <img src="{% static 'game/images/star.png' %}" alt="星" class="flag1 flag-off">
            <img src="{% static 'game/images/star.png' %}" alt="星" class="flag2 flag-off">
            <img src="{% static 'game/images/star.png' %}" alt="星" class="flag3 flag-off">

            <div class="enemy-bubble">
                <p id="response-area">お前は誰だ！姫に近づくな！</p>
                <div class="enemy-arrow"></div>
            </div>

            <div class="user-input-area">
                <input id="user-input" placeholder="ここにユーザーの入力">
                <div class="btn-wrapper">
                    <button id="ask-button" class="btn btn-primary" 
                            data-api-url="/game/api/king_ask/" 
                            data-stage="3"
                            data-next-action-id="start-story-btn">
                            <!--  stage3だけstart-story-btnが表示される -->
                        送信
                    </button>
                </div>
            </div>

            <div id="start-story-btn" style="display: none; margin-top: 450px;">
                <button class="btn btn-warning" id="go-to-dialogue">次へ</button>
            </div>
        
            <div id="love-game-section" style="display: none; text-align: center; margin-top: 20px;">
                <div class="progress mb-3" style="height: 30px;">
                    <div id="love-gauge" class="progress-bar bg-danger" role="progressbar" style="width: 0%;"></div>
                </div>
                <button id="love-button" class="btn btn-danger btn-lg">愛しています！！！</button>
            </div>
            

            <div id="next-action" style="display: none;">
                <a href="{% url 'game:epilogue' %}" class="btn btn-primary">エピローグへ進む</a>
            </div>
        </div>

        <script src="{% static 'game/js/common.js' %}"></script>

        <script src="{% static 'game/js/stage.js' %}"></script>

        <script src="{% static 'game/js/stage3.js' %}"></script>
    </body>
</html>

<!-- 

このページで行われる予定の動作

JavaScriptのfetch()によってinputの内容をキャッチ
→ キャッチした内容を変数「input_text」に代入
→ DjangoのViews.pyへ、input_textを送信
→ Views.pyからai_control.pyへinput_textを送信
→ ai_control.pyで内容を判断し、キーを選出
→ ai_control.pyからViews.pyへキーを返送
→ Views.pyにて、キーを受けてセリフ「output_text」を選択
　（条件を達成していた場合はスイッチをTrueに）
→ Views.pyからoutput_textをJavaScriptへ送信
→ JavaScriptで画面へ出力

※fetch()についてはまだ調べていません
　AIの発案です
　詳細は髭野さんの方で調べてもらえると助かります
※キーは、dialogues.pyにてdict型でまとめられているセリフの中から一つ選ぶためものです
　ステージ名とセリフ名の二つをキーとします
　例：dialogues.pyにおける「なんだお前は！ここは通さないぞ！」というセリフのキーは、
　　　「stage1」と「initial」です
　なお、セリフ名が条件達成時のものであった時スイッチをTrueにする機能に関しては
　稲毛が作りますので、あまり気にしないで大丈夫です

-->
