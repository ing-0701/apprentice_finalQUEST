{% load static %}
<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>エピローグ画面</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="{% static 'game/css/prologue.css' %}">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Balthazar&family=Baskervville:ital,wght@0,400..700;1,400..700&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Jacquard+12&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Sawarabi+Mincho&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    </head>
    <body>
        {% csrf_token %}
        <div class="container">
        
            <div id="dialogue-box">
                <p id="dialogue-text">画面をクリックして物語を進めてね</p>
            </div>

            <div id="next-action" style="display: none;">
                <h1>GAME CLEAR</h1>
                <a href="{% url 'game:start' %}" class="btn btn-primary">タイトルへ戻る</a>
            </div>
        </div>

        <script src="{% static 'game/js/common.js' %}"></script>

        <script src="{% static 'game/js/epilogue.js' %}"></script>
        
    </body>
</html>

<!-- 

このページで行われる予定の動作

エピローグをテキストで進めます
基本的にEnterでテキストを次に進めるだけです
今は便宜上最初からボタンが存在していますが、
最終的には最後のテキストでEnterを押したらボタンが表示されるようにしようと思っています
ページを再読み込みせずに実現するにはJavaScriptを使う必要があると思います

-->
