<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>プロローグ画面</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            /* セリフを見やすくするための簡単な装飾 */
            #dialogue-box {
                min-height: 100px;
                background-color: #f8f9fa;
                padding: 20px;
                border-radius: 10px;
                margin-bottom: 20px;
                cursor: pointer; /* クリックできることを示す */
            }
        </style>
    </head>
    <body class="container mt-5">
        {% csrf_token %}
        <h1>プロローグ画面</h1>
        
        <div id="dialogue-box">
            <p id="dialogue-text" class="fs-4">画面をクリックして物語を進めてね</p>
        </div>

        <div id="next-action" style="display: none;">
            <a href="{% url 'game:stage1' %}" class="btn btn-primary btn-lg">城へ向かおう！</a>
        </div>

        </body>
</html>

<!-- 

このページで行われる予定の動作

プロローグをテキストで進めます
基本的にEnterでテキストを次に進めるだけです
今は便宜上ボタンで次のページに進むようにしていますが、
最終的には最後のテキストでEnterを押したら次に進むようにしようと思っています
ページを再読み込みせずに実現するにはJavaScriptを使う必要があると思います

-->
